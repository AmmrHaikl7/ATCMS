<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>Post New Job | AlumniTrack</title>
        <style>
            /* 1. RESET AND BASIC SETUP */
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f2f5;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            /* 2. THE CARD (White Box) */
            .card {
                background-color: #ffffff;
                width: 100%;
                max-width: 500px;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            }

            /* 3. HEADINGS */
            .card h2 {
                color: #1a1a1a;
                margin-bottom: 8px;
                text-align: center;
            }
            .card p.subtitle {
                color: #666;
                text-align: center;
                margin-bottom: 30px;
                font-size: 0.95rem;
            }

            /* 4. FORM ELEMENTS */
            .form-group {
                margin-bottom: 20px;
            }
            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 600;
                color: #333;
                font-size: 0.9rem;
            }
            input[type="text"], 
            input[type="date"], 
            textarea {
                width: 100%;
                padding: 12px 15px;
                border: 2px solid #e1e4e8;
                border-radius: 8px;
                font-size: 1rem;
                transition: border-color 0.3s ease;
                font-family: inherit;
            }

            /* 5. INTERACTIVE STATES */
            input:focus, textarea:focus {
                border-color: #3b82f6;
                outline: none;
                background-color: #fcfdff;
            }

            /* 6. THE BUTTON */
            .btn-submit {
                width: 100%;
                padding: 14px;
                background-color: #3b82f6;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.2s;
                margin-top: 10px;
            }
            .btn-submit:hover {
                background-color: #2563eb;
            }
        </style>
    </head>
    <body>

        <div class="card">
            <h2>Post a New Job</h2>
            <p class="subtitle">Enter the details for the new open position.</p>

            <form action="LecturerServlet" method="POST">
                
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" name="jobTitle" placeholder="e.g. Senior Java Developer" required="true"/>
                </div>

                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="companyName" placeholder="e.g. Tech Solutions Sdn Bhd" required="true"/>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" placeholder="e.g. Cyberjaya, Selangor"/>
                </div>

                <div class="form-group">
                    <label>Job Description</label>
                    <textarea name="description" rows="4" placeholder="Describe the role and requirements..."></textarea>
                </div>

                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" name="deadline" required="true"/>
                </div>

                <button type="submit" class="btn-submit">Publish Job</button>
                
            </form>
        </div>

    </body>
</html>
