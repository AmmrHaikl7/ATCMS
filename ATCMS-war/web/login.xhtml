<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <title>Login - ATCMS</title>
        <style>
            body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background-color: #f8f9fa; }
            .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
            .form-group { margin-bottom: 20px; text-align: left; }
            label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
            input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
            .btn { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;}
            .btn:hover { background-color: #218838; }
            .error-msg { color: #dc3545; list-style: none; padding: 0; margin-bottom: 15px; font-size: 14px; }
            .link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 14px; }
        </style>
    </h:head>
    <h:body>
        <div class="login-container">
            <h2>Login</h2>
            
            <h:messages globalOnly="true" styleClass="error-msg" />

            <h:form>
                <div class="form-group">
                    <h:outputLabel value="Email Address:" />
                    <h:inputText value="#{alumniController.email}" required="true" requiredMessage="Please enter your email"/>
                </div>

                <div class="form-group">
                    <h:outputLabel value="Password:" />
                    <h:inputSecret value="#{alumniController.password}" required="true" requiredMessage="Please enter your password"/>
                </div>

                <h:commandButton value="Login" action="#{alumniController.login}" styleClass="btn" />
            </h:form>
            
            <h:link value="Don't have an account? Register here" outcome="register" styleClass="link" />
        </div>
    </h:body>
</html>
